<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(190, 95%, 55%)"/>
      <stop offset="100%" stop-color="hsl(220, 90%, 60%)"/>
    </linearGradient>

    <linearGradient id="auroraBand1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="hsl(190, 95%, 55%)" stop-opacity="0"/>
      <stop offset="28%" stop-color="hsl(190, 95%, 55%)" stop-opacity="0.34"/>
      <stop offset="52%" stop-color="hsl(255, 75%, 62%)" stop-opacity="0.28"/>
      <stop offset="78%" stop-color="hsl(220, 90%, 60%)" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="hsl(220, 90%, 60%)" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="auroraBand2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="hsl(220, 90%, 60%)" stop-opacity="0"/>
      <stop offset="22%" stop-color="hsl(220, 90%, 60%)" stop-opacity="0.24"/>
      <stop offset="48%" stop-color="hsl(270, 65%, 58%)" stop-opacity="0.3"/>
      <stop offset="74%" stop-color="hsl(190, 95%, 55%)" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="hsl(190, 95%, 55%)" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="auroraBand3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="hsl(255, 70%, 60%)" stop-opacity="0"/>
      <stop offset="30%" stop-color="hsl(255, 70%, 60%)" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="hsl(200, 90%, 58%)" stop-opacity="0.28"/>
      <stop offset="80%" stop-color="hsl(235, 85%, 62%)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="hsl(235, 85%, 62%)" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="veil" cx="50%" cy="40%" rx="65%" ry="55%">
      <stop offset="25%" stop-color="hsl(222, 47%, 5%)" stop-opacity="0"/>
      <stop offset="100%" stop-color="hsl(222, 47%, 5%)" stop-opacity="0.72"/>
    </radialGradient>

    <style>
      @font-face {
        font-family: "Dancing Script";
        src: url("fonts/DancingScript-Medium.ttf") format("truetype");
        font-weight: 500;
        font-style: normal;
      }
      .name-script {
        font-family: "Dancing Script", cursive;
        font-weight: 500;
        letter-spacing: 0.03em;
      }
    </style>
  </defs>

  <!-- Site background -->
  <rect width="1200" height="630" fill="hsl(222, 47%, 5%)"/>

  <!-- Aurora bands (site palette, crisp gradients) -->
  <rect x="-180" y="20" width="1560" height="180" fill="url(#auroraBand1)" opacity="0.9"/>
  <rect x="-180" y="170" width="1560" height="150" fill="url(#auroraBand2)" opacity="0.85"/>
  <rect x="-180" y="310" width="1560" height="140" fill="url(#auroraBand3)" opacity="0.8"/>
  <rect width="1200" height="630" fill="url(#veil)"/>

  <!-- Glass card -->
  <rect x="64" y="64" width="1072" height="502" rx="28" fill="hsl(222, 40%, 8%)" fill-opacity="0.88" stroke="hsl(217, 33%, 18%)" stroke-width="2"/>
  <rect x="64" y="64" width="1072" height="502" rx="28" fill="none" stroke="hsl(190, 95%, 55%)" stroke-opacity="0.28" stroke-width="1"/>

  <text x="600" y="118" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="500" letter-spacing="0.34em" fill="hsl(215, 20%, 65%)">PORTFOLIO</text>

  <text x="600" y="300" text-anchor="middle" class="name-script" font-size="108">
    <tspan fill="hsl(210, 40%, 98%)">Sriram </tspan><tspan fill="url(#brandGrad)">Kancherla</tspan>
  </text>

  <text x="600" y="368" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="30" font-weight="500" fill="hsl(190, 95%, 55%)">
    Machine Learning &#183; Data Analytics &#183; Full-Stack AI
  </text>

  <text x="600" y="424" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="500" fill="hsl(210, 40%, 98%)">
    ML Intern @ FlyRank AI
  </text>

  <text x="600" y="472" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="19" font-weight="400" fill="hsl(215, 20%, 65%)">
    VIT Vellore &#183; Computer Science
  </text>

  <circle cx="600" cy="522" r="5" fill="hsl(190, 95%, 55%)"/>
</svg>
